# jelly (tmux-sessionizer fork) binds
bind C-o display-popup -E "jelly"
bind C-j display-popup -E "jelly switch"
bind C-w display-popup -E "jelly windows"

set -g status-right " #(jelly sessions)"

# snapshot sessions the moment one closes (jelly lazy restore)
set-hook -g session-closed 'run-shell -b "jelly save"'
bind -r '(' switch-client -p\; refresh-client -S
bind -r ')' switch-client -n\; refresh-client -S

# terminal UI settings for Neovim
set-option -a terminal-features 'alacritty:RGB'

# enable true color for all terminals (fixes color 8 palette in containers)
set -ag terminal-overrides ",*:Tc"

# vi mode bindings
set-window-option -g mode-keys vi

# reload tmux config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# focus events for neovim
set-option -g focus-events on

# Plugins!
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# tmux-resurrect and tmux-continuum disabled — jelly handles session save/restore
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect settings (disabled with the plugins above)
# set -g @resurrect-strategy-nvim 'session'
# set -g @continuum-restore 'on'
# set -g @resurrect-processes 'false' # no nvim restore

# Initialize TMUX plugin manager (keep at bottom of file)
# tpm must be cloned with this command
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run '~/.tmux/plugins/tpm/tpm'
